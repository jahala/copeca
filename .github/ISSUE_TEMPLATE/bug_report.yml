name: Bug report
description: Something copeca does wrong, or differently than the docs say.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did copeca do, and what did you expect instead?
      placeholder: |
        Expected: ...
        Actual:   ...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps or commands. A short repo or a paste is fine.
      placeholder: |
        1. `copeca foo --bar`
        2. Look at the output
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: copeca version
      placeholder: "Output of `pip show copeca`"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "macOS 15, Python 3.11, Claude CLI 2.x — whatever is relevant"
    validations:
      required: false
