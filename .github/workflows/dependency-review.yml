# Dependency Review — gates PRs that introduce vulnerable or
# disallowed-license dependencies. Public repos: free.
# Private repos: requires GitHub Advanced Security.
# See: https://github.com/actions/dependency-review-action
name: dependency review

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  review:
    # dependency-review-action requires a public repo OR GitHub Advanced Security.
    # Skip silently when neither holds — keeps the job green-on-private without
    # blocking PRs. Once the repo is public, this gate becomes a no-op.
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # ratchet:actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
