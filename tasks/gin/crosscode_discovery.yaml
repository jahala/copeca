name: crosscode_discovery
description: "Find HTTP request binding logic in the Gin web framework."
source: "CrossCodeEval (Apache-2.0)"
repo: gin
type: comprehension
language: go
difficulty: medium
version: 1
prompt: |
  In the Gin web framework, find the code that handles HTTP request binding
  to Go structs. When a JSON request body is deserialized into a user-defined
  struct, what file contains the binding logic? Identify the core function
  that performs the actual binding and explain how it handles validation errors.
ground_truth:
  required_strings:
    - Bind
    - ShouldBind
    - binding
    - "func"
    - JSON
  all_of:
    - Bind
    - ShouldBind
    - binding
  forbidden_strings:
    - "I cannot"
    - "unable to"
