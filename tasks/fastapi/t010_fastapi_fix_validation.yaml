name: t010_fastapi_fix_validation
description: "Fix the Pydantic validation that doesn't check for empty string fields in the Item model."
source: "SWE-QA (Apache-2.0)"
repo: fastapi
type: edit
language: python
difficulty: easy
version: 1
prompt: |
  The `Item` Pydantic model in the FastAPI application accepts empty string
  values for the `name` field because it's missing the `min_length=1`
  constraint. Find the model definition and add the `min_length` validator
  to the `name` field so that empty strings are rejected with a validation
  error.
ground_truth:
  required_strings:
    - min_length
    - name
    - str
  test_command:
    - python
    - -c
    - "from pydantic import BaseModel, Field; from main import Item; import pytest; try: Item(name='', price=1.0); assert False, 'Should have raised'; except Exception: pass; print('OK')"
  forbidden_strings:
    - "I cannot"
mutations:
  - file: models.py
    action: replace
    find: "name: str = Field(min_length=1)"
    replace: "name: str = Field()"
    occurrence: 1
