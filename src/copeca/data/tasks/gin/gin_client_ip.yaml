name: gin_client_ip
description: "Locate the complete ClientIP() implementation on gin's Context and map the header-check order and trusted-proxy logic; tests reading a single method to extract a multi-step conditional algorithm."
source: "tilth-benchmark (MIT)"
repo: gin
commit: d7776de7d444935ea4385999711bd6331a98fecb
type: comprehension
category: locate
language: go
