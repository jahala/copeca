name: crosscode_discovery
description: "Find HTTP request binding logic in the Gin web framework."
source: "CrossCodeEval (Apache-2.0)"
repo: gin
type: comprehension
language: go
difficulty: medium
version: 2
prompt: |
  In the Gin web framework, find the code that handles HTTP request binding to
  Go structs. When a JSON request body is deserialized into a user-defined
  struct: (1) which file contains the binding logic and which core function
  performs the actual JSON decoding; and (2) describe the public binding methods
  Gin exposes on the request context for this, including how they differ in
  error handling — which abort the request on a bad body versus which return the
  error to the caller — and where struct-tag validation runs.
ground_truth:
  required_strings:
    - Bind
    - ShouldBind
    - binding
    - "func"
    - JSON
  all_of:
    - Bind
    - ShouldBind
    - binding
  forbidden_strings:
    - "I cannot"
    - "unable to"
