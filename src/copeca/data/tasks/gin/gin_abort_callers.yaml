name: gin_abort_callers
description: "Caller enumeration: show gin's Context.Abort and find every Context method that calls it. Tests resolving actual call sites (distinguishing calls from the Abort definition, the abortIndex constant, and same-prefixed AbortWithX names) rather than textual matches."
source: "copeca-archetypes-2026-06"
repo: gin
commit: d7776de7d444935ea4385999711bd6331a98fecb
type: comprehension
category: trace
language: go
difficulty: medium
version: 1
prompt: |
  Show gin's `Context.Abort` method and explain what it does. Then
  find every other method on Context that calls Abort (directly or
  through another abort helper) and name each of those methods.
ground_truth:
  required_strings:
    - Abort
    - AbortWithStatus
    - AbortWithStatusJSON
    - AbortWithError
