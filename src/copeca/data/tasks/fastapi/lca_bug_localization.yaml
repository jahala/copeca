name: lca_bug_localization
description: "Report the function and file where FastAPI extracts path parameters from the URL and explain what happens on type mismatch; tests single-symbol localization in a request pipeline."
source: "Long Code Arena (Apache-2.0)"
repo: fastapi
type: comprehension
category: locate
language: python
difficulty: medium
version: 1
prompt: |
  In FastAPI's request handling pipeline, locate where path parameters are
  extracted from the URL path. What function or method does the actual
  extraction? Report the file path and the function name. Then explain
  what happens when a path parameter fails to match the declared type.
ground_truth:
  required_strings:
    - path_params
    - path
    - params
    - "def"
  all_of:
    - path_params
    - "def"
  forbidden_strings:
    - "I cannot"
    - "unable to"
