name: ctrl_py_normalize
description: Reason about a self-contained Python function — control task; the answer is computed from the snippet in the prompt.
source: copeca-control (MIT)
repo: fastapi
type: comprehension
category: reason
control: true
language: python
difficulty: easy
version: 1
prompt: |
  Given only this self-contained Python function:

      def normalize(name: str) -> str:
          return name.strip().lower().replace(" ", "_")

  What does normalize("  Hello World ") return? Answer with the value only.
ground_truth:
  required_strings:
    - hello_world
