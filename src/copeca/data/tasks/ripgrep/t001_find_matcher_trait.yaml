name: t001_find_matcher_trait
description: "Find the Matcher trait definition in the ripgrep codebase and list all structs that implement it."
source: "SWE-QA (Apache-2.0)"
repo: ripgrep
type: comprehension
category: trace
language: rust
difficulty: hard
version: 1
prompt: |
  Find the `Matcher` trait definition in the ripgrep codebase and list all
  structs that implement this trait. For each implementor, note which crate
  it lives in and what methods it provides.
ground_truth:
  required_strings:
    - Matcher
    - trait
    - RegexMatcher
    - GlobMatcher
  all_of:
    - RegexMatcher
    - GlobMatcher
  forbidden_strings:
    - "I cannot"
    - "unable to"
