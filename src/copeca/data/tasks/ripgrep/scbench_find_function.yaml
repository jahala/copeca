name: scbench_find_function
description: "Report the function, file, and signature that controls case-insensitive matching in ripgrep and how it selects between modes; tests single-function localization with decision-logic explanation."
source: "SCBench (MIT)"
repo: ripgrep
type: comprehension
category: locate
language: rust
difficulty: medium
version: 1
prompt: |
  In the ripgrep codebase, find the function that handles case-insensitive
  pattern matching. What file is it in and what is its full signature?
  Explain how it decides whether to do a case-sensitive or case-insensitive match.
ground_truth:
  required_strings:
    - case_insensitive
    - CaseMatching
    - insensitive
    - "fn"
  all_of:
    - case_insensitive
    - CaseMatching
  forbidden_strings:
    - "I cannot"
    - "unable to"
