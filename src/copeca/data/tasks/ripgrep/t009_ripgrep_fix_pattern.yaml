name: t009_ripgrep_fix_pattern
description: "Fix the regex pattern compilation that panics on invalid UTF-8 byte sequences."
source: "SWE-QA (Apache-2.0)"
repo: ripgrep
type: edit
category: fix
language: rust
difficulty: hard
version: 1
prompt: |
  ripgrep's regex pattern compilation panics when it encounters invalid UTF-8
  byte sequences in the pattern. Locate the pattern compilation code and add
  proper error handling so invalid UTF-8 produces a clean error instead of a
  panic.
ground_truth:
  required_strings:
    - from_utf8
    - Error
    - pattern
  test_command:
    - cargo
    - test
    - --test
    - integration
    - invalid_utf8_pattern
  forbidden_strings:
    - "I cannot"
mutations:
  - file: crates/printer/src/lib.rs
    action: replace
    find: "from_utf8"
    replace: "from_utf8_unchecked"
    occurrence: 1
