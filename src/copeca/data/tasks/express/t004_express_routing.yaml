name: t004_express_routing
description: "Find the Router class in Express and trace how app.use() registers middleware."
source: "SWE-QA (Apache-2.0)"
repo: express
type: comprehension
category: trace
language: javascript
difficulty: medium
version: 1
prompt: |
  Find the `Router` class in the Express codebase and trace how `app.use()`
  registers middleware. Explain how routes are stored internally, how the
  layer stack is constructed, and what happens when a request matches multiple
  middleware functions.
ground_truth:
