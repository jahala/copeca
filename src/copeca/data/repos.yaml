    rust: "1.80.0"

flask:
  url: https://github.com/pallets/flask.git
  commit: 10bdf61a0f751f3cb000f8f8ac5ac5b4bb535677
  language: python
  toolchain:
    python: "3.11"
  # Per-worktree venv with the repo's PINNED test deps (newer pytest breaks old
  # conftests). This isolation is what lets verbatim SWE-bench-Live python tasks
  # run at arbitrary base_commits without colliding across parallel worktrees.
  setup_command:
    - bash
    - -lc
    - "uv venv .venv && uv pip install --python .venv/bin/python -q -e . -r requirements/tests.txt"
