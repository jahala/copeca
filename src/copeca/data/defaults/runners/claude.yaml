# Claude Code runner — CLI interface + pricing.
# Interface verified against `claude --help` (v2.1.183).
# Pricing illustrative — verify current rates at use. Updated: 2026-06-19

# The CLI interface copeca uses to invoke this agent. Everything here is data —
# copeca's build_runner reads it; nothing about Claude is hardcoded in cli.py.
runner:
  cli: claude  # binary name; defaults to this file's stem if omitted
  default_args:
    - -p
    - --output-format
    - stream-json
    - --verbose
    - --dangerously-skip-permissions
  arg_map:
    model: --model
    tools: --tools
    budget: --max-budget-usd
    system_prompt: --system-prompt
    mcp_config: --mcp-config
    prompt_separator: --
  # config_dir_env delivers the per-arm agent_config overlay (hook modes).
  # isolation.config_home_env names the same var but serves a different role:
  # it sets the private-home pointer for baseline + MCP modes (ISO-2 lock 1).
  config_dir_env: CLAUDE_CONFIG_DIR
  parser: stream_json
  isolation:
    config_home_env: CLAUDE_CONFIG_DIR
    strict_mcp_flags: [--strict-mcp-config]
    disable_session_flags: [--no-session-persistence]
    disable_ambient_env: { CLAUDE_CODE_DISABLE_CLAUDE_MDS: "1" }
    disable_telemetry_env: { CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1" }
    ambient_files: [CLAUDE.md, CLAUDE.local.md]
    api_key_env: ANTHROPIC_API_KEY
    version_cmd: [claude, --version]

pricing:
  claude-sonnet-4-6:
    input: 3.00
    cache_creation: 3.75
    cache_read: 0.30
    output: 15.00
    updated: "2026-06-19"
  claude-opus-4-8:
    input: 15.00
    cache_creation: 18.75
    cache_read: 1.50
    output: 75.00
    updated: "2026-06-19"
  claude-haiku-4-5:
    input: 1.00
    cache_creation: 1.25
    cache_read: 0.10
    output: 5.00
    updated: "2026-06-19"
